plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.0.189'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

minecraft {
    runs {
        client {
            commonArgs '--nogui'
            client()
        }
        server {
            server()
        }
        gameTestServer {
            server()
        }
    }
}

sourceSets.main {
    resources {
        srcDirs += 'src/main/resources'
    }
}

repositories {
    maven {
        name = 'Minecraft Fortress'
        url = 'https://maven.neoforged.net/releases'
    }
}

dependencies {
    implementation 'org.jetbrains:annotations:24.1.0'
}

tasks.named('processResources') {
    var replaceProperties = [
            minecraft_version   : minecraft_version,
            neoform_version     : neoform_version,
            loader_version_range: loader_version_range,
            mod_id              : mod_id,
            mod_name            : mod_name,
            mod_license         : mod_license,
            mod_version         : mod_version,
            mod_group_id        : mod_group_id,
            mod_jar_url         : mod_jar_url ?: '',
            mod_credits         : mod_credits ?: ''
    ]
    inputs.properties replaceProperties

    expand replaceProperties
}

tasks.named('jar', JavaCompile) {
    archiveClassifier = 'sources'
}

tasks.named('gameTestServer') {
    workingDirectory(file('run'))
}

tasks.register('setup') {
    depends classes
}